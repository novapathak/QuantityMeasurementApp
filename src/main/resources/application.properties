spring.application.name=quantity-measurement-app

spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.root=INFO
logging.level.com.apps.quantitymeasurement=DEBUG

app.security.jwt.secret=${APP_JWT_SECRET:change-this-jwt-secret-to-a-long-random-value-for-production-1234567890}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
app.security.jwt.issuer=${APP_JWT_ISSUER:quantity-measurement-app}
app.security.default-user.username=${APP_DEFAULT_USERNAME:admin}
app.security.default-user.email=${APP_DEFAULT_EMAIL:admin@quantitymeasurement.local}
app.security.default-user.full-name=${APP_DEFAULT_FULL_NAME:Default Admin}
app.security.default-user.password=${APP_DEFAULT_PASSWORD:Admin@12345}
app.security.default-user.roles=${APP_DEFAULT_ROLES:USER}
app.security.default-user.enabled=${APP_DEFAULT_USER_ENABLED:true}

app.oauth2.google.enabled=${GOOGLE_OAUTH_ENABLED:false}
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth2.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
app.oauth2.google.authorized-redirect-uri=${GOOGLE_AUTHORIZED_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
