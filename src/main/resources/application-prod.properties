spring.application.name=quantity-measurement-app

spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurementdb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=quantity_user
spring.datasource.password=change-me

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

logging.level.root=WARN
logging.level.com.apps.quantitymeasurement=INFO
